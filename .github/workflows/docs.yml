name: Test documentation build

on:
  pull_request:
    paths:
      - '**.py'
      - '**.ipynb'
      - '**.rst'
      - '**.md'

jobs:
  build-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Setup Micromamba
      uses: mamba-org/setup-micromamba@v3
      with:
        environment-file: environment.yml
        init-shell: bash
        condarc: |
          channels:
            - conda-forge
          channel_priority: strict
          cache-environment: true

    - name: Install package (editable)
      shell: bash -l {0}
      run: |
        micromamba run -n ek80adcp python -m pip install --upgrade pip
        micromamba run -n ek80adcp python -m pip install -e . --no-deps --force-reinstall

    - name: Build documentation
      shell: bash -l {0}
      run: |
        set -e
        pushd docs
        micromamba run -n ek80adcp make clean html
        popd
